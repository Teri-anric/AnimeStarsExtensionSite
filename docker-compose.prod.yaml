x-backend-app: &backend-app
  build:
    context: backend
    dockerfile: Dockerfile
  volumes:
    - ./backend/app:/app
    - ./backend/migration:/migration
    - ./cookies:/cookies:rw
  env_file:
    - .env
  restart: unless-stopped
  environment:
    - DATABASE__HOST=db
    - PARSER__PROXY=socks5://proxy:8080

x-frontend-app: &frontend-app
  build:
    context: frontend
    dockerfile: Dockerfile
  env_file:
    - .env
  volumes:
    - ./frontend:/app


services:
  build-frontend:
    <<: *frontend-app
    command: npm run build

  backend:
    <<: *backend-app
    command: python -m uvicorn app.web:app --host 0.0.0.0 --port 8000 --workers 4
    expose:
      - "8000"
    depends_on:
      - db

  scheduler:
    <<: *backend-app
    command: python -m app.scheduler
    depends_on:
      - db

  db:
    image: postgres:16
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${DATABASE__USER}
      - POSTGRES_PASSWORD=${DATABASE__PASSWORD}
      - POSTGRES_DB=${DATABASE__DB}
      - POSTGRES_PORT=${DATABASE__PORT}
    expose:
      - "${DATABASE__PORT}"
    volumes:
      - ./db:/var/lib/postgresql/data


  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    depends_on:
      - grafana



  proxy:
    image: mitmproxy/mitmproxy
    command: mitmdump --mode socks5 --listen-host 0.0.0.0 --listen-port 8080 --set block_global=false --set ssl_insecure=true
    restart: unless-stopped
    volumes:
      - ./.mitmproxy:/home/mitmproxy/.mitmproxy
    expose:
      - 8080

  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "9091:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - backend

  loki:
    image: grafana/loki:3.3.2
    restart: unless-stopped
    command: -config.file=/etc/loki/config.yaml
    expose:
      - "3100"
    volumes:
      - loki_data:/loki
      - ./docker/loki/config.yaml:/etc/loki/config.yaml:ro

  promtail:
    image: grafana/promtail:3.3.2
    restart: unless-stopped
    command: -config.file=/etc/promtail/config.yaml
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./docker/promtail/config.yaml:/etc/promtail/config.yaml:ro
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:11.3.1
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA__ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA__ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA__ROOT_URL:-http://localhost:3001}
      GRAFANA_DS_PG_USER: ${DATABASE__USER}
      GRAFANA_DS_PG_PASSWORD: ${DATABASE__PASSWORD}
      GRAFANA_DS_PG_DATABASE: ${DATABASE__DB}
      GRAFANA_DS_PG_PORT: ${DATABASE__PORT}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki


volumes:
  caddy_data:
  caddy_config:
  grafana_data:
  loki_data: 
  prometheus_data: